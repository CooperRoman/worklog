<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="WorkLog"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>WorkLog</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--g:#c8f060;--r:#ff6b6b;--y:#f0c060;--bg:#0a0a0a;--card:#141414;--border:#1e1e1e;--text:#f0ede6;--dim:#555}
html,body{background:var(--bg);color:var(--text);font-family:'DM Mono',ui-monospace,'Cascadia Code','Courier New',monospace;min-height:100vh;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
input,select{background:#181818;border:1px solid #252525;color:var(--text);padding:10px 12px;border-radius:8px;font-family:ui-monospace,'Cascadia Code','Courier New',monospace;font-size:13px;width:100%;outline:none;-webkit-appearance:none;appearance:none;transition:border .15s}
input:focus,select:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(200,240,96,.1)}
select option{background:#181818}
button{cursor:pointer;font-family:inherit;transition:all .15s}
.btn{background:var(--g);color:#0a0a0a;border:none;padding:11px 18px;border-radius:8px;font-size:13px;font-weight:500;letter-spacing:.05em}
.btn:active{transform:scale(.97)}
.btn:disabled{background:#222;color:#444;cursor:default;transform:none}
.btn-red{background:var(--r)}
.btn-ghost{background:transparent;border:1px solid #252525;color:#777;padding:7px 12px;border-radius:7px;font-size:11px}
.btn-ghost:hover{border-color:var(--g);color:var(--g)}
.btn-del{background:transparent;border:none;color:#2a2a2a;font-size:20px;padding:2px 6px;line-height:1}
.btn-del:hover{color:var(--r)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.lbl{font-size:10px;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px;display:block}
.row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #181818}
.row:last-child{border-bottom:none}
.chip{display:inline-block;background:#1e1e1e;border-radius:20px;padding:2px 8px;font-size:10px;color:#777}
.chip-g{background:#0f1c00;color:var(--g);border:1px solid #2e4400}
.chip-y{background:#1c1600;color:var(--y);border:1px solid #3a2e00}
.chip-r{background:#1a0808;color:var(--r);border:1px solid #4a1515}
.seg-wrap{display:flex;gap:6px;margin-bottom:12px}
.seg{background:#161616;border:1px solid #222;color:#555;padding:7px 0;border-radius:7px;font-size:11px;flex:1;text-align:center}
.seg.on{background:var(--g);color:#0a0a0a;border-color:var(--g);font-weight:500}
.pbar-wrap{height:5px;background:#1c1c1c;border-radius:4px;overflow:hidden;margin-top:8px}
.pbar-fill{height:100%;border-radius:4px;transition:width .6s}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#0c0c0c;border-top:1px solid #181818;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;background:transparent;border:none;color:#383838;padding:10px 0 13px;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-btn.on{color:var(--g)}
.nav-btn span:first-child{font-size:19px;line-height:1}
.nav-btn span:last-child{font-size:9px;letter-spacing:.1em;text-transform:uppercase}
.screen{display:none;padding:14px 18px 0;flex-direction:column;gap:11px}
.screen.on{display:flex}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center}
.modal-bg.on{display:flex}
.modal{background:#141414;border:1px solid #252525;border-radius:16px 16px 0 0;padding:20px 18px 36px;width:100%;max-width:480px}
.toast{display:none;position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--g);color:#0a0a0a;padding:8px 20px;border-radius:30px;font-size:12px;font-weight:500;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(200,240,96,.3);pointer-events:none}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.hero{background:linear-gradient(145deg,#0e1c00,#111100);border:1px solid #263000;border-radius:14px;padding:18px}
.big{font-family:'Bebas Neue','Arial Narrow',ui-sans-serif,sans-serif;letter-spacing:.04em;line-height:1;font-weight:700}
.faded{color:#444;font-size:10px}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.au{animation:fadeUp .2s ease}
/* mini bar chart */
.bars{display:flex;align-items:flex-end;gap:4px;height:80px;padding-top:8px}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;height:100%}
.bar-col .bar{width:100%;border-radius:3px 3px 0 0;background:#253510;transition:background .2s}
.bar-col .bar.active{background:var(--g)}
.bar-col .bar-lbl{font-size:8px;color:#3a3a3a;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center}
/* install banner */
#install-banner{background:#0f1c00;border-bottom:1px solid #2e4400;padding:10px 14px;display:flex;align-items:center;gap:10px}
</style>
</head>
<body>

<div id="install-banner" style="display:none">
  <div style="flex:1;font-size:11px;color:var(--g);line-height:1.5">📲 <strong>Install:</strong> tap Share ↑ → <em>"Add to Home Screen"</em></div>
  <button class="btn-del" onclick="this.parentElement.style.display='none'">×</button>
</div>

<!-- HEADER -->

<div style="padding:20px 18px 0;display:flex;align-items:flex-start;justify-content:space-between">
  <div>
    <div class="big" style="font-size:32px">WORK<span style="color:var(--g)">LOG</span></div>
    <div style="font-size:9px;color:#3a3a3a;letter-spacing:.14em;margin-top:1px">THU–WED · SUBMIT WED · PAID FRI</div>
  </div>
  <div id="rate-display">
    <button class="btn-ghost" id="rate-edit-btn" style="margin-top:4px"></button>
  </div>
  <div id="rate-form" style="display:none;gap:6px;align-items:center">
    <input id="rate-input" placeholder="$/hr" style="width:76px"/>
    <button class="btn" onclick="applyRate()" style="padding:9px 12px;white-space:nowrap">Set</button>
  </div>
</div>

<!-- SCREENS -->

<div id="screen-home" class="screen on au"></div>
<div id="screen-log"  class="screen au"></div>
<div id="screen-hist" class="screen au"></div>
<div id="screen-budget" class="screen au"></div>

<!-- BOTTOM NAV -->

<div id="nav">
  <button class="nav-btn on" onclick="goTab('home',this)"><span>⚡</span><span>Home</span></button>
  <button class="nav-btn"    onclick="goTab('log',this)"><span>＋</span><span>Log</span></button>
  <button class="nav-btn"    onclick="goTab('hist',this)"><span>📋</span><span>History</span></button>
  <button class="nav-btn"    onclick="goTab('budget',this)"><span>💰</span><span>Budget</span></button>
</div>

<!-- CC PAYMENT MODAL -->

<div id="cc-modal" class="modal-bg" onclick="if(event.target===this)closeCCModal()">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="big" style="font-size:22px;color:var(--r)">💳 LOG CC PAYMENT</div>
      <button class="btn-del" onclick="closeCCModal()" style="color:#555;font-size:22px">×</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div><span class="lbl">Card Name</span><input id="cc-card" placeholder="e.g. Chase, Discover…"/></div>
      <div><span class="lbl">Amount Paid</span><input id="cc-amount" type="number" placeholder="$ Amount"/></div>
      <div><span class="lbl">Date</span><input id="cc-date" type="date"/></div>
      <div><span class="lbl">Note (optional)</span><input id="cc-note" placeholder="e.g. full balance, minimum…"/></div>
      <button class="btn btn-red" onclick="saveCCPayment()" style="margin-top:4px;padding:13px">+ Log Payment</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────
const SK = "worklog_v4";
const BACKLOG = [
  {date:"2025-01-29",start:"09:00",end:"17:00",hours:8,   note:""},
  {date:"2025-01-29",start:"21:00",end:"23:30",hours:2.5, note:"night"},
  {date:"2025-01-30",start:"14:30",end:"16:30",hours:2,   note:""},
  {date:"2025-02-02",start:"08:30",end:"16:00",hours:7.5, note:""},
  {date:"2025-02-03",start:"08:30",end:"17:30",hours:9,   note:""},
  {date:"2025-02-09",start:"09:00",end:"17:00",hours:8,   note:""},
  {date:"2025-02-09",start:"19:30",end:"21:00",hours:1.5, note:"evening"},
  {date:"2025-02-10",start:"08:00",end:"17:30",hours:9.5, note:""},
  {date:"2025-02-11",start:"08:00",end:"16:00",hours:8,   note:""},
  {date:"2025-02-12",start:"08:30",end:"17:00",hours:8.5, note:""},
  {date:"2025-02-13",start:"08:00",end:"17:30",hours:9.5, note:""},
  {date:"2025-02-17",start:"10:00",end:"18:00",hours:8,   note:""},
  {date:"2025-02-18",start:"10:00",end:"17:00",hours:7,   note:""},
  {date:"2025-02-19",start:"08:00",end:"16:00",hours:8,   note:""},
  {date:"2025-02-20",start:"08:00",end:"16:00",hours:8,   note:""},
  {date:"2025-02-23",start:"08:00",end:"15:00",hours:7,   note:""},
  {date:"2025-02-24",start:"08:00",end:"14:00",hours:6,   note:""},
  {date:"2025-02-25",start:"08:00",end:"17:00",hours:9,   note:""},
  {date:"2025-02-26",start:"08:00",end:"17:00",hours:9,   note:""},
  {date:"2025-02-27",start:"08:00",end:"16:00",hours:8,   note:""},
  {date:"2025-03-02",start:"08:00",end:"17:00",hours:9,   note:""},
  {date:"2025-03-03",start:"08:00",end:"17:00",hours:9,   note:""},
  {date:"2025-03-04",start:"07:00",end:"15:00",hours:8,   note:""},
  {date:"2025-03-05",start:"08:00",end:"16:00",hours:8,   note:""},
  {date:"2025-03-06",start:"08:00",end:"16:00",hours:8,   note:""},
];
const CATS = ["🏠 Housing","🚗 Transport","🛒 Groceries","🍔 Food","💡 Utilities","📱 Phone","🎮 Entertainment","💊 Health","👕 Clothing","💳 Credit Card","📦 Other"];
const CAT_COLORS = ["#c8f060","#60d4f0","#f060c8","#f0c060","#60f0a0","#f07060","#a060f0","#60f0d4","#f09060","#ff6b6b","#9060f0"];
const FREQS = ["daily","weekly","biweekly","monthly","yearly"];

let D = null;

function loadData() {
  try { const r = localStorage.getItem(SK); if(r) return JSON.parse(r); } catch{}
  return {
    hourlyRate:18, rateSet:true,
    entries: BACKLOG.map((b,i)=>({id:1000+i,...b,earnings:Math.round(b.hours*18*100)/100})),
    expenses:[], recurring:[], ccPayments:[]
  };
}
function save() { try { localStorage.setItem(SK, JSON.stringify(D)); } catch{} }

// ── Helpers ───────────────────────────────────────────────────────────────────
function ppStart(ds) {
  const d = new Date(ds+"T00:00:00"), day = d.getDay();
  const t = new Date(d); t.setDate(d.getDate() - ((day+3)%7));
  return t.toISOString().slice(0,10);
}
function ppDates(ps) {
  const t = new Date(ps+"T00:00:00");
  const sub = new Date(t); sub.setDate(t.getDate()+6);
  const pay = new Date(t); pay.setDate(t.getDate()+8);
  return {sub, pay};
}
function calcH(s,e) {
  if(!s||!e) return 0;
  const [sh,sm]=s.split(":").map(Number),[eh,em]=e.split(":").map(Number);
  let sv=sh*60+sm, ev=eh*60+em; if(ev<sv)ev+=1440;
  return Math.round(((ev-sv)/60)*100)/100;
}
function fmt(n,d=2){ return Number(n||0).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fmtD(ds){ return new Date(ds+"T00:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}); }
function fmtShort(dt){ return dt.toLocaleDateString("en-US",{month:"short",day:"numeric"}); }
function toMonthly(a,f){ const v=parseFloat(a)||0; return f==="daily"?v*30.4:f==="weekly"?v*4.33:f==="biweekly"?v*2.17:f==="yearly"?v/12:v; }
function uid(){ return Date.now()+Math.floor(Math.random()*1000); }

let toastTimer = null;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.style.display="none", 2200);
}

function pbar(pct, color="#c8f060") {
  const p = Math.min(100, Math.max(0, pct));
  return `<div class="pbar-wrap"><div class="pbar-fill" style="width:${p}%;background:${color}"></div></div>`;
}

function chip(txt, cls="") { return `<span class="chip ${cls}">${txt}</span>`; }

function statCard(label, val, sub) {
  return `<div class="card" style="text-align:center;padding:12px 8px">
    <span class="lbl">${label}</span>
    <div class="big" style="font-size:18px;color:var(--g)">${val}</div>
    <div style="font-size:10px;color:#555;margin-top:2px">${sub}</div>
  </div>`;
}

// ── Derived ───────────────────────────────────────────────────────────────────
function derived() {
  const rate   = parseFloat(D.hourlyRate)||0;
  const today  = new Date().toISOString().slice(0,10);
  const thisPP = ppStart(today);
  const {sub:subDay, pay:payDay} = ppDates(thisPP);
  const dSub   = Math.ceil((subDay - new Date()) / 86400000);
  const dPay   = Math.ceil((payDay  - new Date()) / 86400000);
  const thisM  = today.slice(0,7);

  const totH   = D.entries.reduce((s,e)=>s+e.hours,0);
  const totE   = D.entries.reduce((s,e)=>s+e.earnings,0);
  const ppEnts = D.entries.filter(e=>ppStart(e.date)===thisPP);
  const ppH    = ppEnts.reduce((s,e)=>s+e.hours,0);
  const ppEar  = ppEnts.reduce((s,e)=>s+e.earnings,0);
  const mtdH   = D.entries.filter(e=>e.date.startsWith(thisM)).reduce((s,e)=>s+e.hours,0);
  const mtdEar = D.entries.filter(e=>e.date.startsWith(thisM)).reduce((s,e)=>s+e.earnings,0);

  const oneTime   = D.expenses||[];
  const recurring = D.recurring||[];
  const ccPay     = D.ccPayments||[];
  const totOT  = oneTime.reduce((s,e)=>s+parseFloat(e.amount),0);
  const totRec = recurring.reduce((s,r)=>s+toMonthly(r.amount,r.freq),0);
  const totCC  = ccPay.reduce((s,p)=>s+parseFloat(p.amount),0);
  const totSp  = totOT+totRec+totCC;
  const bal    = totE - totSp;

  // Chart data - last 8 pay periods
  const ppMap = {};
  D.entries.forEach(e=>{ const k=ppStart(e.date); ppMap[k]=(ppMap[k]||[]); ppMap[k].push(e); });
  const ppKeys = Object.keys(ppMap).sort().slice(-8);
  const maxHrs = Math.max(...ppKeys.map(k=>ppMap[k].reduce((s,e)=>s+e.hours,0)), 1);
  const chartItems = ppKeys.map(k=>({
    key:k,
    hrs: ppMap[k].reduce((s,e)=>s+e.hours,0),
    lbl: new Date(k+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})
  }));

  return {rate,today,thisPP,subDay,payDay,dSub,dPay,thisM,totH,totE,ppEnts,ppH,ppEar,mtdH,mtdEar,oneTime,recurring,ccPay,totOT,totRec,totCC,totSp,bal,chartItems,maxHrs};
}

// ── Navigation ────────────────────────────────────────────────────────────────
let currentTab = "home";
let budgetView = "overview";
let expandedPP = null;

function goTab(id, btn) {
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("on"));
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("on"));
  document.getElementById("screen-"+id).classList.add("on");
  if(btn) btn.classList.add("on");
  currentTab = id;
  render();
}

function setBView(v) { budgetView = v; renderBudget(); }
function togglePP(k) { expandedPP = expandedPP===k ? null : k; renderHist(); }

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const dv = derived();
  updateHeader(dv);
  if(currentTab==="home")   renderHome(dv);
  if(currentTab==="log")    renderLog(dv);
  if(currentTab==="hist")   renderHist(dv);
  if(currentTab==="budget") renderBudget(dv);
}

function updateHeader(dv) {
  const btn = document.getElementById("rate-edit-btn");
  btn.textContent = `$${fmt(dv.rate,2)}/hr ✎`;
  btn.onclick = () => {
    document.getElementById("rate-display").style.display = "none";
    document.getElementById("rate-form").style.display = "flex";
    document.getElementById("rate-input").value = D.hourlyRate;
  };
}

function applyRate() {
  const r = parseFloat(document.getElementById("rate-input").value);
  if(!r||r<=0) return;
  D.hourlyRate = r;
  D.entries = D.entries.map(e=>({...e, earnings: Math.round(e.hours*r*100)/100}));
  save();
  document.getElementById("rate-display").style.display = "";
  document.getElementById("rate-form").style.display = "none";
  toast("Rate updated ✓");
  render();
}

// ── HOME ──────────────────────────────────────────────────────────────────────
function renderHome(dv) {
  const {subDay,payDay,dSub,dPay,thisPP,totH,totE,ppH,ppEar,ppEnts,mtdH,mtdEar,totSp,totRec,bal,chartItems,maxHrs} = dv;

  // Bar chart HTML
  let barsHTML = "";
  chartItems.forEach(item => {
    const h = Math.round((item.hrs/maxHrs)*100);
    const active = item.key===thisPP ? "active" : "";
    barsHTML += `<div class="bar-col">
      <div class="bar ${active}" style="height:${h}%"></div>
      <div class="bar-lbl">${item.lbl}</div>
    </div>`;
  });

  const recurringPreview = (D.recurring||[]).slice(0,4).map(r=>
    `<div class="row" style="padding:7px 0">
      <div style="font-size:12px">${r.label}</div>
      ${chip(`↻ $${fmt(r.amount,0)}/${r.freq.slice(0,3)}`,"chip-y")}
    </div>`).join("");

  document.getElementById("screen-home").innerHTML = `
  <div class="au">
  <!-- Pay period countdown -->
  <div style="background:#0d1500;border:1px solid #263000;border-radius:10px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center">
    <div>
      <span class="lbl">Current Pay Period</span>
      <div style="font-size:12px;color:#aaa">${fmtD(thisPP)} → ${fmtShort(subDay)}</div>
    </div>
    <div style="display:flex;gap:8px">
      ${dSub>=0?`<div style="text-align:center;background:#1a2a00;border-radius:8px;padding:6px 10px">
        <div class="big" style="font-size:20px;color:var(--y)">${dSub}</div>
        <div style="font-size:8px;color:#6a7a40">to submit</div>
      </div>`:""}
      ${dPay>=0?`<div style="text-align:center;background:#1a2a00;border-radius:8px;padding:6px 10px">
        <div class="big" style="font-size:20px;color:var(--g)">${dPay}</div>
        <div style="font-size:8px;color:#6a7a40">to payday 💰</div>
      </div>`:""}
    </div>
  </div>

  <!-- Hero balance -->
  <div class="hero">
    <span class="lbl">Net Balance</span>
    <div class="big" style="font-size:52px;color:${bal>=0?'var(--g)':'var(--r)'}">
      <span style="font-size:26px;vertical-align:super">${bal>=0?'+$':'-$'}</span>${fmt(Math.abs(bal),0)}
    </div>
    ${pbar(totSp/(totE||1)*100, bal>=0?'var(--g)':'var(--r)')}
    <div style="font-size:10px;color:#4a6010;margin-top:5px">${Math.round(totSp/(totE||1)*100)}% of earnings used</div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <div style="flex:1;background:rgba(200,240,96,.06);border-radius:8px;padding:8px 9px">
        <div style="font-size:9px;color:var(--g);opacity:.7;letter-spacing:.1em;margin-bottom:2px">EARNED</div>
        <div class="big" style="font-size:16px;color:var(--g)">$${fmt(totE,0)}</div>
      </div>
      <div style="flex:1;background:rgba(255,107,107,.06);border-radius:8px;padding:8px 9px">
        <div style="font-size:9px;color:var(--r);opacity:.7;letter-spacing:.1em;margin-bottom:2px">SPENT</div>
        <div class="big" style="font-size:16px;color:var(--r)">$${fmt(totSp,0)}</div>
      </div>
      <div style="flex:1;background:rgba(240,192,96,.06);border-radius:8px;padding:8px 9px">
        <div style="font-size:9px;color:var(--y);opacity:.7;letter-spacing:.1em;margin-bottom:2px">BILLS/MO</div>
        <div class="big" style="font-size:16px;color:var(--y)">$${fmt(totRec,0)}</div>
      </div>
    </div>
  </div>

  <!-- This pay period -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span class="lbl">This Pay Period</span>
      <span style="font-size:10px;color:#555">Submit Wed · Paid Fri</span>
    </div>
    <div class="grid2">
      <div style="background:#0d1500;border-radius:8px;padding:10px 12px">

// ── LOG ───────────────────────────────────────────────────────────────────────
function renderLog(dv) {

  const today = new Date().toISOString().slice(0,10);

  // Same-day entries
  const sameDay = D.entries.filter(e=>e.date===today);
  const sameDayHTML = sameDay.length>0 ? `
    <div class="card">
      <span class="lbl">Already logged today</span>
      ${sameDay.map(e=>`<div class="row">
        <div style="font-size:12px;color:#888">${e.start} – ${e.end}${e.note?" · "+e.note:""}</div>
        <div style="display:flex;gap:10px;align-items:center">
          <span style="color:var(--g);font-size:13px">${fmt(e.hours,2)} hr</span>
          <button class="btn-del" onclick="delEntry(${e.id})">×</button>
        </div>
      </div>`).join("")}
    </div>` : "";

  document.getElementById("screen-log").innerHTML = `
  <div class="au">
  <div style="background:#0d1500;border:1px solid #263000;border-radius:8px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center">
    <div style="font-size:11px;color:#6a8a30">Pay period: ${fmtD(thisPP)} → ${fmtShort(subDay)}</div>
    ${chip(fmt(ppH,1)+" hr logged","chip-g")}
  </div>
  <div class="card"><span class="lbl">Date</span><input type="date" id="log-date" value="${today}"/></div>
  <div class="grid2">
    <div class="card"><span class="lbl">Clock In</span><input type="time" id="log-start" oninput="updatePreview()"/></div>
    <div class="card"><span class="lbl">Clock Out</span><input type="time" id="log-end" oninput="updatePreview()"/></div>
  </div>
  <div class="card"><span class="lbl">Note (optional)</span><input id="log-note" placeholder="e.g. overtime, site visit…"/></div>
  <div id="log-preview" style="display:none;background:#0d1a00;border:1px solid #2a4000;border-radius:10px;padding:14px 16px">
    <div style="display:flex;justify-content:space-between;align-items:flex-end">
      <div>
        <span class="lbl" style="color:#5a7a20">Hours</span>
        <div class="big" id="preview-hrs" style="font-size:38px;color:var(--g)"></div>
      </div>
      <div style="text-align:right">
        <span class="lbl" style="color:#5a7a20">Earnings</span>
        <div class="big" id="preview-ear" style="font-size:38px;color:var(--g)"></div>
      </div>
    </div>
    <div class="pbar-wrap" style="margin-top:10px"><div class="pbar-fill" id="preview-bar" style="background:var(--g)"></div></div>
    <div id="preview-sub" style="font-size:9px;color:#4a6010;margin-top:4px"></div>
  </div>
  <button class="btn" id="log-btn" style="padding:13px;font-size:14px;border-radius:10px;width:100%" onclick="logShift()" disabled>+ Log Shift</button>
  ${sameDayHTML}
  </div>`;
}

function updatePreview() {
  const s = document.getElementById("log-start")?.value;
  const e = document.getElementById("log-end")?.value;
  const h = calcH(s, e);
  const preview = document.getElementById("log-preview");
  const btn = document.getElementById("log-btn");
  if(h>0) {
    preview.style.display = "block";
    document.getElementById("preview-hrs").textContent = fmt(h,2);
    document.getElementById("preview-ear").textContent = "$"+fmt(h*(parseFloat(D.hourlyRate)||0),2);
    document.getElementById("preview-bar").style.width = Math.min(100,h/12*100)+"%";
    const ppH = D.entries.filter(e2=>ppStart(e2.date)===ppStart(new Date().toISOString().slice(0,10))).reduce((s,e2)=>s+e2.hours,0);
    document.getElementById("preview-sub").textContent = `${Math.round(h/12*100)}% of 12-hr day · period total after: ${fmt(ppH+h,1)} hr`;
    btn.disabled = false;
  } else {
    preview.style.display = "none";
    btn.disabled = true;
  }
}

function logShift() {
  const date  = document.getElementById("log-date").value;
  const start = document.getElementById("log-start").value;
  const end   = document.getElementById("log-end").value;
  const note  = document.getElementById("log-note").value;
  const hours = calcH(start, end);
  if(!date||!start||!end||hours<=0) return;
  const earnings = Math.round(hours*(parseFloat(D.hourlyRate)||0)*100)/100;
  D.entries.push({id:uid(), date, start, end, note, hours, earnings});
  D.entries.sort((a,b)=>b.date.localeCompare(a.date));
  save(); toast("✓ Shift logged!"); renderLog(derived());
  document.getElementById("log-start").value="";
  document.getElementById("log-end").value="";
  document.getElementById("log-note").value="";
  updatePreview();
}

function delEntry(id) {
  D.entries = D.entries.filter(e=>e.id!==id);
  save(); toast("Shift removed"); render();
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function renderHist(dv) {
  if(!dv) dv = derived();
  const {thisPP, totH, totE} = dv;
  const histMap = {};
  [...D.entries].sort((a,b)=>b.date.localeCompare(a.date)).forEach(e=>{
    const k = ppStart(e.date); if(!histMap[k]) histMap[k]=[];
    histMap[k].push(e);
  });
  const weeks = Object.entries(histMap).sort(([a],[b])=>b.localeCompare(a));

  const weeksHTML = weeks.map(([ps, ents])=>{
    const pH2  = ents.reduce((s,e)=>s+e.hours,0);
    const pEar = ents.reduce((s,e)=>s+e.earnings,0);
    const open = expandedPP===ps;
    const {sub:s2, pay:p2} = ppDates(ps);
    const isCur = ps===thisPP;
    const rowsHTML = open ? ents.map(e=>`
      <div class="row" style="padding:9px 0">
        <div style="flex:1">
          <div style="font-size:13px">${fmtD(e.date)}</div>
          <div style="font-size:10px;color:#555;margin-top:2px">${e.start} – ${e.end}${e.note?" · "+e.note:""}</div>
        </div>
        <div style="text-align:right;margin-right:8px">
          <div style="color:var(--g);font-size:13px">${fmt(e.hours,2)} hr</div>
          <div style="font-size:11px;color:#666">$${fmt(e.earnings,2)}</div>
        </div>
        <button class="btn-del" onclick="delEntry(${e.id})">×</button>
      </div>`).join("") : "";
    return `
    <div class="card" style="padding:12px 14px;border-color:${isCur?"#2e4400":"var(--border)"}">
      <div onclick="togglePP('${ps}')" style="display:flex;justify-content:space-between;align-items:center;cursor:pointer">
        <div>
          <div style="display:flex;align-items:center;gap:7px">
            <div style="font-size:13px;font-weight:500">${fmtD(ps)}</div>
            ${isCur?chip("current","chip-g"):""}
          </div>
          <div style="font-size:10px;color:#555;margin-top:2px">Submit ${fmtShort(s2)} · Paid ${fmtShort(p2)} · ${ents.length} shift${ents.length!==1?"s":""}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="text-align:right">
            <div class="big" style="font-size:16px;color:var(--g)">${fmt(pH2,1)} hr</div>
            <div style="font-size:10px;color:#666">$${fmt(pEar,2)}</div>
          </div>
          <div style="color:#333;font-size:16px;transition:transform .2s;transform:${open?"rotate(90deg)":"none"}">›</div>
        </div>
      </div>
      ${open?`<div style="margin-top:10px;border-top:1px solid #1e1e1e;padding-top:8px">${rowsHTML}</div>`:""}
    </div>`;
  }).join("");

  document.getElementById("screen-hist").innerHTML = `
  <div class="au">
  <div style="display:flex;justify-content:space-between;margin-bottom:2px">
    <span style="font-size:11px;color:#444">${D.entries.length} shifts · ${fmt(totH,1)} hrs</span>
    <span style="font-size:11px;color:var(--g)">$${fmt(totE,2)} total</span>
  </div>
  ${weeksHTML || `<div style="text-align:center;color:#2e2e2e;padding:60px 0;font-size:13px">No shifts yet</div>`}
  </div>`;
}

function renderBudget(dv) {
  if(!dv) dv = derived();
  const el = document.getElementById("screen-budget");
  const tabs = [["overview","Overview"],["expenses","Expenses"],["recurring","↻ Bills"],["cc","💳 Cards"]];
  const segHTML = `<div class="seg-wrap">${tabs.map(([v,l])=>`<button class="seg${budgetView===v?" on":""}" onclick="setBView('${v}')" style="font-size:10px">${l}</button>`).join("")}</div>`;

  let content = "";
  if(budgetView==="overview")  content = renderBudgetOverview(dv);
  if(budgetView==="expenses")  content = renderBudgetExpenses(dv);
  if(budgetView==="recurring") content = renderBudgetRecurring(dv);
  if(budgetView==="cc")        content = renderBudgetCC(dv);

  el.innerHTML = `<div class="au">${segHTML}${content}</div>`;
}

function renderBudgetOverview(dv) {
  const {totE,totSp,totOT,totRec,totCC,bal,oneTime} = dv;

  // Donut SVG
  const catMap = {};
  oneTime.forEach(e=>{ catMap[e.cat]=(catMap[e.cat]||0)+parseFloat(e.amount); });
  if(totCC>0) catMap["💳 Credit Card"]=(catMap["💳 Credit Card"]||0)+totCC;
  const donutTotal = Object.values(catMap).reduce((s,v)=>s+v,0);
  const donutSegs = Object.entries(catMap).map(([c,v])=>({label:c, val:v, color:CAT_COLORS[CATS.indexOf(c)%CAT_COLORS.length]}));

  let donutHTML = "";
  if(donutSegs.length>0) {
    const r=38,circ=2*Math.PI*r; let off=0;
    const circles = donutSegs.map((s,i)=>{
      const pct=s.val/(donutTotal||1), dash=pct*circ;
      const el = `<circle cx="55" cy="55" r="${r}" fill="none" stroke="${s.color}" stroke-width="15" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-off*circ}" style="transform:rotate(-90deg);transform-origin:center"/>`;
      off+=pct; return el;
    }).join("");
    const legend = donutSegs.map((s,i)=>`
      <div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">
        <div style="width:7px;height:7px;border-radius:2px;background:${s.color};flex-shrink:0"></div>
        <div style="font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#aaa">${s.label}</div>
        <div style="font-size:11px;color:${s.color}">$${fmt(s.val,0)}</div>
      </div>`).join("");
    donutHTML = `<div class="card" style="display:flex;align-items:center;gap:16px">
      <svg width="110" height="110" viewBox="0 0 110 110">
        <circle cx="55" cy="55" r="${r}" fill="none" stroke="#1c1c1c" stroke-width="15"/>
        ${circles}
        <text x="55" y="51" text-anchor="middle" fill="#f0ede6" font-size="11" font-weight="600">$${fmt(donutTotal,0)}</text>
        <text x="55" y="64" text-anchor="middle" fill="#555" font-size="8">total spent</text>
      </svg>
      <div style="flex:1">${legend}</div>
    </div>`;
  } else {
    donutHTML = `<div class="card" style="text-align:center;color:#2e2e2e;padding:30px;font-size:12px">Add expenses to see spending breakdown</div>`;
  }

  return `
  <div class="hero">
    <span class="lbl">Net Balance</span>
    <div class="big" style="font-size:46px;color:${bal>=0?'var(--g)':'var(--r)'}">
      <span style="font-size:22px;vertical-align:super">${bal>=0?'+$':'-$'}</span>${fmt(Math.abs(bal),0)}
    </div>
    ${pbar(totSp/(totE||1)*100, bal>=0?'var(--g)':'var(--r)')}
    <div style="font-size:10px;color:#4a6010;margin-top:5px">${Math.round(totSp/(totE||1)*100)}% of $${fmt(totE,0)} earned spent</div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
    ${[["Earned","$"+fmt(totE,0),"var(--g)"],["One-time","$"+fmt(totOT,0),"var(--r)"],["Bills/mo","$"+fmt(totRec,0),"var(--y)"],["CC Paid","$"+fmt(totCC,0),"#ff9f9f"]].map(([l,v,c])=>
      `<div class="card" style="text-align:center;padding:10px 8px">
        <span class="lbl">${l}</span>
        <div class="big" style="font-size:16px;color:${c}">${v}</div>
      </div>`).join("")}
  </div>
  ${donutHTML}`;
}

let expType = "one-time";
function switchExpType(t) {
  expType = t;
  document.getElementById("exp-type-ot")?.classList.toggle("on", t==="one-time");
  document.getElementById("exp-type-rec")?.classList.toggle("on", t==="recurring");
  const fw = document.getElementById("exp-freq-wrap");
  const dw = document.getElementById("exp-date")?.parentElement;
  if(fw) fw.style.display = t==="recurring"?"block":"none";
  const dateEl = document.getElementById("exp-date");
  if(dateEl) dateEl.style.display = t==="one-time"?"block":"none";
}

function addExpense() {
  const label  = document.getElementById("exp-label")?.value?.trim();
  const amount = parseFloat(document.getElementById("exp-amount")?.value);
  const cat    = document.getElementById("exp-cat")?.value || "📦 Other";
  const date   = document.getElementById("exp-date")?.value || new Date().toISOString().slice(0,10);
  const freq   = document.getElementById("exp-freq")?.value || "monthly";
  if(!label||!amount||isNaN(amount)) return;
  if(expType==="recurring") {
    if(!D.recurring) D.recurring=[];
    D.recurring.push({id:uid(), label, amount, cat, freq});
    toast("↻ Recurring bill added!");
  } else {
    if(!D.expenses) D.expenses=[];
    D.expenses.push({id:uid(), date, label, amount, cat});
    D.expenses.sort((a,b)=>b.date.localeCompare(a.date));
    toast("✓ Expense added!");
  }
  save(); renderBudget();
}

function delExpense(id) {
  D.expenses = D.expenses.filter(e=>e.id!==id);
  save(); toast("Removed"); renderBudget();
}

function addRecurring() {

}

function renderBudgetCC(dv) {
  const {totCC, ccPay} = dv;
  const byCard = {};
  ccPay.forEach(p=>{ if(!byCard[p.cardName]) byCard[p.cardName]={payments:[],total:0}; byCard[p.cardName].payments.push(p); byCard[p.cardName].total+=parseFloat(p.amount); });

  const cardsHTML = Object.keys(byCard).length>0
    ? Object.entries(byCard).map(([name,{payments,total}])=>`
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <div>
              <div style="font-size:14px;font-weight:500">💳 ${name}</div>
              <div style="font-size:10px;color:#666;margin-top:2px">${payments.length} payment${payments.length!==1?"s":""}</div>
            </div>
            <div class="big" style="font-size:20px;color:var(--r)">$${fmt(total,2)}</div>
          </div>
          ${payments.map(p=>`<div class="row" style="padding:8px 0">
            <div style="flex:1">
              <div style="font-size:12px;color:#aaa">${new Date(p.date+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</div>
              ${p.note?`<div style="font-size:10px;color:#555;margin-top:1px">${p.note}</div>`:""}
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="big" style="font-size:16px;color:var(--r)">$${fmt(p.amount,2)}</span>
              <button class="btn-del" onclick="delCCPayment(${p.id})">×</button>
            </div>
          </div>`).join("")}
        </div>`).join("")
    : `<div style="text-align:center;color:#2e2e2e;padding:40px 20px;font-size:12px;line-height:2">No CC payments logged yet.<br>Tap the button above when you pay off your card.</div>`;

  return `
  <div style="background:#1a0808;border:1px solid #4a1515;border-radius:14px;padding:16px">
    <span class="lbl">Total CC Paid (All Time)</span>
    <div class="big" style="font-size:38px;color:var(--r)">$${fmt(totCC,2)}</div>
    <div style="font-size:10px;color:#7a3a3a;margin-top:4px">${ccPay.length} payment${ccPay.length!==1?"s":""} logged</div>
  </div>
  <button class="btn btn-red" style="padding:13px;font-size:14px;border-radius:10px;width:100%" onclick="openCCModal()">+ Log Credit Card Payment</button>
  ${cardsHTML}`;
}

function openCCModal() {
  document.getElementById("cc-date").value = new Date().toISOString().slice(0,10);
  document.getElementById("cc-card").value = "";
  document.getElementById("cc-amount").value = "";
  document.getElementById("cc-note").value = "";
  document.getElementById("cc-modal").classList.add("on");
}
function closeCCModal() { document.getElementById("cc-modal").classList.remove("on"); }

function saveCCPayment() {
  const cardName = document.getElementById("cc-card").value.trim();
  const amount   = parseFloat(document.getElementById("cc-amount").value);
  const date     = document.getElementById("cc-date").value;
  const note     = document.getElementById("cc-note").value.trim();
  if(!cardName||!amount||isNaN(amount)) return;
  if(!D.ccPayments) D.ccPayments=[];
  D.ccPayments.push({id:uid(), cardName, amount, date, note});
  D.ccPayments.sort((a,b)=>b.date.localeCompare(a.date));
  save(); closeCCModal(); toast("💳 CC payment logged!"); renderBudget();
}

function delCCPayment(id) {
  D.ccPayments = D.ccPayments.filter(p=>p.id!==id);
  save(); toast("Removed"); renderBudget();
}

// ── Init ──────────────────────────────────────────────────────────────────────
D = loadData();

// iOS install banner
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isSafari = /safari/i.test(navigator.userAgent) && !/chrome/i.test(navigator.userAgent);
const standalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
if(isIOS && isSafari && !standalone) document.getElementById("install-banner").style.display="flex";

// PWA manifest
const m={name:"WorkLog",short_name:"WorkLog",start_url:"/",display:"standalone",background_color:"#0a0a0a",theme_color:"#0a0a0a",orientation:"portrait"};
const bl=new Blob([JSON.stringify(m)],{type:"application/json"});
const lnk=document.createElement("link"); lnk.rel="manifest"; lnk.href=URL.createObjectURL(bl);
document.head.appendChild(lnk);

render();
</script>
